<!DOCTYPE html>

<script src="geupsik.js"></script>
<body>

    <nav class="navbar">
        <div class="nav-wrapper">
            급식

                <svg aria-label="Home" class="x1lliihq x1n2onr6 x5n08af" onclick="location.href = 'index.html'" fill="currentColor" height="24" role="img" viewBox="0 0 24 24" width="24"><title>Home</title><path d="m21.762 8.786-7-6.68C13.266.68 10.734.68 9.238 2.106l-7 6.681A4.017 4.017 0 0 0 1 11.68V20c0 1.654 1.346 3 3 3h5.005a1 1 0 0 0 1-1L10 15c0-1.103.897-2 2-2 1.09 0 1.98.877 2 1.962L13.999 22a1 1 0 0 0 1 1H20c1.654 0 3-1.346 3-3v-8.32a4.021 4.021 0 0 0-1.238-2.894ZM21 20a1 1 0 0 1-1 1h-4.001L16 15c0-2.206-1.794-4-4-4s-4 1.794-4 4l.005 6H4a1 1 0 0 1-1-1v-8.32c0-.543.226-1.07.62-1.447l7-6.68c.747-.714 2.013-.714 2.76 0l7 6.68c.394.376.62.904.62 1.448V20Z"></path></svg>

                <i class="icon fas fa-utensils"></i>
                <div class="icon user-profile"></div>

        </div>
    </nav>

    <main class="main">
        <section class="container">
            <div class="left-col">
                <div class="post">
                    <div class="info">
                        <div class="user">
                            <p class="username">조식</p>
                        </div>
                    </div>
                    <div class="im" id="brim">조식</div>
                    <div class="post-content">
                        <div class="reaction-wrapper">
                            <i class="icon fa-regular fa-heart" id="lb" onclick="likupb();"></i>
                            <i class="icon fa-regular fa-paper-plane" onclick="navigator.share({ title: '조식', text: document.getElementById('breakfast').innerText })"></i>
                        </div>
                        <p class="likes">좋아요 <span id="likeb">0</span>개</p>
                        <p class="description"><span> </span> <span id="breakfast"></span></p>
                        <p class="post-time">3월 9일 월요일</p>
                    </div>
                </div>
                <div class="post">
                    <div class="info">
                        <div class="user">
                            <p class="username">중식</p>
                        </div>
                    </div>
                    <div class="im" id="lnim">중식</div>
                    <div class="post-content">
                        <div class="reaction-wrapper">
                            <i class="icon fa-regular fa-heart" id="ll" onclick="likupl();"></i>
                            <i class="icon fa-regular fa-paper-plane" onclick="navigator.share({ title: '중식', text: document.getElementById('lunch').innerText })"></i>
                        </div>
                        <p class="likes">좋아요 <span id="likel">0</span>개</p>
                        <p class="description"><span> </span> <span id="lunch"></span></p>
                        <p class="post-time">3월 9일 월요일</p>
                    </div>
                </div>
                <div class="post">
                    <div class="info">
                        <div class="user">
                            <p class="username">석식</p>
                        </div>
                    </div>
                    <div class="im" id="dnim">석식</div>
                    <div class="post-content">
                        <div class="reaction-wrapper">
                            <i class="icon fa-regular fa-heart" id="ld" onclick="likupd();"></i>
                            <i class="icon fa-regular fa-paper-plane" onclick="navigator.share({ title: '석식', text: document.getElementById('dinner').innerText })"></i>
                        </div>
                        <p class="likes">좋아요 <span id="liked">0</span>개</p>
                        <p class="description"><span> </span> <span id="dinner"></span></p>
                        <p class="post-time">3월 9일 월요일</p>
                    </div>
                </div>
            </div>

            
        </section>
    </main>
