<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geupstagram</title>
    <link rel="stylesheet" href="instyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<script src="geupsik.js"></script>
<body>

    <nav class="navbar">
        <div class="nav-wrapper">
            급식
            <div class="nav-items">
                <i class="icon fa-regular fa-house" onclick="location.href = 'index.html'"></i>
                <i class="icon fa-regular fa-heart"></i>
                <i class="icon fas fa-utensils"></i>
                <div class="icon user-profile"></div>
            </div>
        </div>
    </nav>

    <main class="main">
        <section class="container">
            <div class="left-col">
                <div class="post">
                    <div class="info">
                        <div class="user">
                            <p class="username">조식</p>
                        </div>
                    </div>
                    <div class="im" id="brim">조식</div>
                    <div class="post-content">
                        <div class="reaction-wrapper">
                            <i class="icon fa-regular fa-heart" id="lb" onclick="likupb();"></i>
                            <i class="icon fa-regular fa-paper-plane"></i>
                        </div>
                        <p class="likes">좋아요 <span id="likeb">0</span>개</p>
                        <p class="description"><span> </span> <span id="breakfast"></span></p>
                        <p class="post-time">3월 9일 월요일</p>
                    </div>
                </div>
                <div class="post">
                    <div class="info">
                        <div class="user">
                            <p class="username">중식</p>
                        </div>
                    </div>
                    <div class="im" id="lnim">중식</div>
                    <div class="post-content">
                        <div class="reaction-wrapper">
                            <i class="icon fa-regular fa-heart" id="ll" onclick="likupl();"></i>
                            <i class="icon fa-regular fa-paper-plane"></i>
                        </div>
                        <p class="likes">좋아요 <span id="likel">0</span>개</p>
                        <p class="description"><span> </span> <span id="lunch"></span></p>
                        <p class="post-time">3월 9일 월요일</p>
                    </div>
                </div>
                <div class="post">
                    <div class="info">
                        <div class="user">
                            <p class="username">석식</p>
                        </div>
                    </div>
                    <div class="im" id="dnim">석식</div>
                    <div class="post-content">
                        <div class="reaction-wrapper">
                            <i class="icon fa-regular fa-heart" id="ld" onclick="likupd();"></i>
                            <i class="icon fa-regular fa-paper-plane"></i>
                        </div>
                        <p class="likes">좋아요 <span id="liked">0</span>개</p>
                        <p class="description"><span> </span> <span id="dinner"></span></p>
                        <p class="post-time">3월 9일 월요일</p>
                    </div>
                </div>
            </div>

            
        </section>
    </main>

</body>
</html>
